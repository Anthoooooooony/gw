# Rust 生态过滤规则（v2 DSL：仅无损变换）。
# 这里只做 strip_ansi + 长度截断。去编译进度、只保留失败用例等语义压缩
# 需要写专属 Go filter（见 ROADMAP / ARCHITECTURE）。

[cargo.build]
match = "cargo build"
strip_ansi = true
tail_lines = 120
on_empty = "cargo build: ok"

[cargo.check]
match = "cargo check"
strip_ansi = true
tail_lines = 120
on_empty = "cargo check: ok"

[cargo.clippy]
match = "cargo clippy"
strip_ansi = true
tail_lines = 120
on_empty = "cargo clippy: ok"

[cargo.test]
match = "cargo test"
strip_ansi = true
tail_lines = 200
on_empty = "cargo test: ok"
