# Rust 生态过滤规则（v2 DSL：仅无损变换）。
# 这里只做 strip_ansi + 长度截断。去编译进度、只保留失败用例等语义压缩
# 需要写专属 Go filter（见 ROADMAP / ARCHITECTURE）。

[cargo.build]
match = "cargo build"
strip_ansi = true
tail_lines = 120
on_empty = "cargo build: ok"

  # 失败时 cargo 通常只留若干 error 块 + 总结行，截到最后 40 行即可覆盖典型诊断。
  [cargo.build.on_error]
  strip_ansi = true
  tail_lines = 40
  on_empty = "cargo build: 失败但无输出"

[cargo.check]
match = "cargo check"
strip_ansi = true
tail_lines = 120
on_empty = "cargo check: ok"

  [cargo.check.on_error]
  strip_ansi = true
  tail_lines = 40
  on_empty = "cargo check: 失败但无输出"

[cargo.clippy]
match = "cargo clippy"
strip_ansi = true
tail_lines = 120
on_empty = "cargo clippy: ok"

  [cargo.clippy.on_error]
  strip_ansi = true
  tail_lines = 40
  on_empty = "cargo clippy: 失败但无输出"

[cargo.test]
match = "cargo test"
strip_ansi = true
tail_lines = 200
on_empty = "cargo test: ok"

  # 失败场景只看 failures 块 + summary，截到最后 80 行通常够覆盖几个失败用例。
  [cargo.test.on_error]
  strip_ansi = true
  tail_lines = 80
  on_empty = "cargo test: 失败但无输出"
