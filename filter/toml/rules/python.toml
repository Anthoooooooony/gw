# Python 生态过滤规则（v2 DSL：仅无损变换）。
# 这里只做 strip_ansi + 长度截断。pytest 只保留 failures / pip 去下载进度
# 等语义压缩需要写专属 Go filter（见 ROADMAP / ARCHITECTURE）。

# ---------------- pip ----------------
# pip install 由 filter/pip 专属 Go filter 接管。

[pip.list]
match = "pip list"
strip_ansi = true
max_lines = 60

# ---------------- pytest ----------------
# pytest 已由 filter/pytest 专属 Go filter 接管（按 summary + FAILURES 锚点
# 做语义压缩），此处无规则。

# ---------------- venv ----------------

[venv.create]
match = "python -m venv"
strip_ansi = true
max_lines = 20
on_empty = "python -m venv: ok"
