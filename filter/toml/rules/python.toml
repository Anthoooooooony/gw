# Python 生态过滤规则（v2 DSL：仅无损变换）。
# 这里只做 strip_ansi + 长度截断。pytest 只保留 failures / pip 去下载进度
# 等语义压缩需要写专属 Go filter（见 ROADMAP / ARCHITECTURE）。

# ---------------- pip ----------------

[pip.install]
match = "pip install"
strip_ansi = true
max_lines = 60
on_empty = "pip install: ok"

[pip.list]
match = "pip list"
strip_ansi = true
max_lines = 60

# ---------------- pytest ----------------

[pytest.run]
match = "pytest"
strip_ansi = true
tail_lines = 150
on_empty = "pytest: ok"

[pytest.module]
match = "python -m pytest"
strip_ansi = true
tail_lines = 150
on_empty = "python -m pytest: ok"

# ---------------- venv ----------------

[venv.create]
match = "python -m venv"
strip_ansi = true
max_lines = 20
on_empty = "python -m venv: ok"
