# Node 生态过滤规则（v2 DSL：仅无损变换）。
# 这里只做 strip_ansi + 长度截断。语义压缩（比如"只留失败用例"）需要写专属
# Go filter（见 ROADMAP / ARCHITECTURE）。

# ---------------- npm ----------------

[npm.install]
match = "npm install"
strip_ansi = true
max_lines = 80
on_empty = "npm install: ok"

[npm.ci]
match = "npm ci"
strip_ansi = true
max_lines = 80
on_empty = "npm ci: ok"

[npm.test]
match = "npm test"
strip_ansi = true
tail_lines = 120
on_empty = "npm test: ok"

[npm.run-build]
match = "npm run build"
strip_ansi = true
tail_lines = 80
on_empty = "npm run build: ok"

# ---------------- yarn ----------------

[yarn.install]
match = "yarn install"
strip_ansi = true
max_lines = 60
on_empty = "yarn install: ok"

[yarn.test]
match = "yarn test"
strip_ansi = true
tail_lines = 120
on_empty = "yarn test: ok"

[yarn.build]
match = "yarn build"
strip_ansi = true
tail_lines = 80
on_empty = "yarn build: ok"

# ---------------- pnpm ----------------

[pnpm.install]
match = "pnpm install"
strip_ansi = true
max_lines = 60
on_empty = "pnpm install: ok"

[pnpm.i]
match = "pnpm i"
strip_ansi = true
max_lines = 60
on_empty = "pnpm i: ok"

[pnpm.test]
match = "pnpm test"
strip_ansi = true
tail_lines = 120
on_empty = "pnpm test: ok"

[pnpm.build]
match = "pnpm build"
strip_ansi = true
tail_lines = 80
on_empty = "pnpm build: ok"

[pnpm.publish]
match = "pnpm publish"
strip_ansi = true
max_lines = 30
on_empty = "pnpm publish: ok"
