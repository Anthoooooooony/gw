name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.25'

      - name: go mod tidy check
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: go vet
        run: go vet ./...

      - name: gofmt style gate
        shell: bash
        run: |
          files=$(gofmt -l .)
          if [ -n "$files" ]; then
            printf '%s\n' "$files" >&2
            count=$(printf '%s\n' "$files" | wc -l | tr -d ' ')
            echo "gofmt found $count unformatted file(s); run 'gofmt -w .' locally" >&2
            exit 1
          fi

      - name: go test -race -cover
        env:
          CGO_ENABLED: '1'
        run: go test -race -count=1 -coverprofile=coverage.out -covermode=atomic ./...

      - name: upload coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-${{ matrix.os }}
          path: coverage.out
          if-no-files-found: warn

      # TestScenarioCompression 在 go test 阶段已经写好了 filter/scenario-compression-report.md，
      # 这里把它贴到 Actions 运行页的 Summary，reviewer 打开 CI 就能看到每个 mvn/gradle/git
      # 子命令的原始/压缩后字节和相对 baseline 的压缩率 Δ。同时上传 artifact 供离线查看。
      - name: scenario compression report → summary
        if: matrix.os == 'ubuntu-latest' && always()
        shell: bash
        run: |
          report=filter/scenario-compression-report.md
          if [ -f "$report" ]; then
            cat "$report" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "gw CI: $report 缺失（TestScenarioCompression 未执行？）" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: upload scenario compression report artifact
        if: matrix.os == 'ubuntu-latest' && always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: scenario-compression-report
          path: filter/scenario-compression-report.md
          if-no-files-found: warn

      - name: bash unit tests
        if: matrix.os == 'ubuntu-latest'
        run: bash scripts/bump_test.sh

  build:
    name: build (linux-amd64, CGO)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.25'

      - name: go build
        env:
          CGO_ENABLED: '1'
        run: go build ./...

  shellcheck:
    name: shellcheck (scripts/)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # 2.0.0
        with:
          scandir: './scripts'

  actionlint:
    name: actionlint (.github/workflows/)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Run actionlint
        uses: rhysd/actionlint@914e7df21a07ef503a81201c76d2b11c789d3fca # v1.7.12
        with:
          fail_on_error: true

  golangci-lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.25'
      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9
        with:
          version: v2.2.2
          args: --timeout=5m

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.25'
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./...
