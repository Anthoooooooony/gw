name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: go mod tidy check
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: go vet
        run: go vet ./...

      - name: gofmt style gate
        shell: bash
        run: |
          files=$(gofmt -l .)
          if [ -n "$files" ]; then
            printf '%s\n' "$files" >&2
            count=$(printf '%s\n' "$files" | wc -l | tr -d ' ')
            echo "gofmt found $count unformatted file(s); run 'gofmt -w .' locally" >&2
            exit 1
          fi

      - name: go test -race -cover
        env:
          CGO_ENABLED: '1'
        run: go test -race -count=1 -coverprofile=coverage.out -covermode=atomic ./...

      - name: upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.os }}
          path: coverage.out
          if-no-files-found: warn

      - name: bash unit tests
        if: matrix.os == 'ubuntu-latest'
        run: bash scripts/bump_test.sh

  build:
    name: build (linux-amd64, CGO)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: go build
        env:
          CGO_ENABLED: '1'
        run: go build ./...

  shellcheck:
    name: shellcheck (scripts/)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './scripts'

  actionlint:
    name: actionlint (.github/workflows/)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run actionlint
        run: |
          bash <(curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint -color

  golangci-lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.2.2
          args: --timeout=5m

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./...
