name: release

# CI-driven 自动发版：master 每次 push 触发一次 decide；若有 user-facing commit
# 则自动 bump 版本、打 tag、构建跨平台 assets、创建 GitHub Release 并上传。
# 所有步骤在同一 workflow run 内顺序执行，不依赖跨 workflow 触发，GITHUB_TOKEN 足够。

on:
  push:
    branches: [master]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  decide:
    name: decide
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      should_release: ${{ steps.decide.outputs.should_release }}
      new_tag: ${{ steps.decide.outputs.new_tag }}
      prev_tag: ${{ steps.decide.outputs.prev_tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - id: decide
        shell: bash
        env:
          REPO: ${{ github.repository }}
        run: |
          source scripts/release-helpers.sh

          prev_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "prev_tag=${prev_tag}"

          mapfile -d '' commits < <(git log "${prev_tag}..HEAD" --format='%s%n%b%x00')
          classifications=()
          for msg in "${commits[@]}"; do
            [[ -z "$msg" ]] && continue
            cls=$(classify_commit "$msg")
            [[ -n "$cls" ]] && classifications+=("$cls")
          done

          kind=$(kind_from_classifications "${classifications[@]}")
          echo "classifications=${#classifications[@]} kind=${kind}"
          if [[ "$kind" == "none" ]]; then
            echo "no user-facing commits since ${prev_tag}, skipping release"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          new_tag=$(bump_version "$prev_tag" "$kind")
          {
            echo "should_release=true"
            echo "new_tag=${new_tag}"
            echo "prev_tag=${prev_tag}"
          } >> "$GITHUB_OUTPUT"
          echo "bumping ${prev_tag} → ${new_tag} (${kind})"

          git log "${prev_tag}..HEAD" --format='%s%n%b%x1F%h%x00' |
            build_release_notes "$new_tag" "$prev_tag" "$REPO" > release-notes.md

          echo "--- release notes preview ---"
          cat release-notes.md

      - name: Upload release notes artifact
        if: steps.decide.outputs.should_release == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-notes
          path: release-notes.md
          retention-days: 1

  build:
    name: build (${{ matrix.goos }}-${{ matrix.goarch }})
    needs: decide
    if: needs.decide.outputs.should_release == 'true'
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-latest, goos: linux,  goarch: amd64 }
          - { runner: macos-latest,  goos: darwin, goarch: arm64 }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build with version injection
        env:
          CGO_ENABLED: '1'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          NEW_TAG: ${{ needs.decide.outputs.new_tag }}
        run: |
          mkdir -p dist
          commit=$(git rev-parse --short HEAD)
          date=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          go build -trimpath \
            -ldflags "-s -w \
              -X github.com/Anthoooooooony/gw/cmd.Version=${NEW_TAG} \
              -X github.com/Anthoooooooony/gw/cmd.Commit=${commit} \
              -X github.com/Anthoooooooony/gw/cmd.BuildDate=${date}" \
            -o dist/gw \
            .

      - name: Archive tar.gz
        env:
          NEW_TAG: ${{ needs.decide.outputs.new_tag }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          cd dist
          cp ../README.md .
          tar czf "gw_${NEW_TAG}_${GOOS}_${GOARCH}.tar.gz" gw README.md
          ls -la ./*.tar.gz

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: gw-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.tar.gz
          retention-days: 1

  release:
    name: tag & release
    needs: [decide, build]
    if: needs.decide.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts

      - name: Stage assets + checksums
        run: |
          mkdir -p dist
          find artifacts -name '*.tar.gz' -exec cp {} dist/ \;
          cp artifacts/release-notes/release-notes.md ./release-notes.md
          cd dist
          sha256sum ./*.tar.gz > checksums.txt
          cat checksums.txt

      - name: Configure git identity for tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create and push annotated tag
        env:
          NEW_TAG: ${{ needs.decide.outputs.new_tag }}
        run: |
          git tag -a "$NEW_TAG" -m "release $NEW_TAG"
          git push origin "$NEW_TAG"

      - name: Create GitHub Release with assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_TAG: ${{ needs.decide.outputs.new_tag }}
        run: |
          args=(
            --title "$NEW_TAG"
            --notes-file release-notes.md
          )
          if [[ "$NEW_TAG" == *-* ]]; then
            args+=(--prerelease)
          fi
          gh release create "$NEW_TAG" "${args[@]}" dist/*.tar.gz dist/checksums.txt
