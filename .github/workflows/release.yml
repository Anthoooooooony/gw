name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # 创建 GitHub Release 需要

jobs:
  # 每平台在原生 runner 上编译（CGO 需要原生 toolchain）
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-latest, goos: linux,  goarch: amd64 }
          - { runner: macos-latest,  goos: darwin, goarch: arm64 }   # Apple Silicon
          # macos-13（Intel amd64）暂不覆盖——GitHub free tier 排队过长，Intel Mac
          # 装机份额已低于 5%，用户可用 `go install` 自建。后续视需求增补。
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Build native binary with version injection
        env:
          CGO_ENABLED: '1'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          version="${GITHUB_REF_NAME}"
          commit=$(git rev-parse --short HEAD)
          date=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          go build -trimpath \
            -ldflags "-s -w \
              -X github.com/gw-cli/gw/cmd.Version=${version} \
              -X github.com/gw-cli/gw/cmd.Commit=${commit} \
              -X github.com/gw-cli/gw/cmd.BuildDate=${date}" \
            -o dist/gw \
            .
          ./dist/gw version

      - name: Create archive (tar.gz with README/CHANGELOG)
        run: |
          cd dist
          cp ../README.md ../CHANGELOG.md .
          tar czf "gw_${GITHUB_REF_NAME}_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz" \
            gw README.md CHANGELOG.md
          ls -la ./*.tar.gz

      - name: Upload archive artifact
        uses: actions/upload-artifact@v7
        with:
          name: gw-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.tar.gz
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all archives into dist/
        uses: actions/download-artifact@v8
        with:
          path: dist/
          pattern: gw-*
          merge-multiple: true

      - name: Generate checksums.txt
        run: |
          cd dist
          sha256sum ./*.tar.gz > checksums.txt
          cat checksums.txt

      - name: Extract release notes from CHANGELOG
        run: |
          version="${GITHUB_REF_NAME}"
          awk -v v="$version" '
            $1=="##" && $2=="["v"]" { in_block=1; next }
            in_block && /^## \[/ { exit }
            in_block { print }
          ' CHANGELOG.md > /tmp/release-notes.md
          if [[ ! -s /tmp/release-notes.md ]]; then
            echo "警告：CHANGELOG.md 中未找到 ${version} 节，release 将用默认正文" >&2
            echo "Release ${version}" > /tmp/release-notes.md
          fi
          head -20 /tmp/release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*.tar.gz
            dist/checksums.txt
          body_path: /tmp/release-notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
