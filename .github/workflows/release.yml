name: release

on:
  push:
    tags:
      - 'v*.*.*'

# 默认最小权限；release job 单独提升到 write
permissions:
  contents: read

# 同一 tag 的并发跑串行化，避免竞争 release asset 上传
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # 每平台在原生 runner 上编译（CGO 需要原生 toolchain）
  build:
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-latest, goos: linux,  goarch: amd64 }
          - { runner: macos-latest,  goos: darwin, goarch: arm64 }   # Apple Silicon
          # macos-13（Intel amd64）暂不覆盖——GitHub free tier 排队过长，Intel Mac
          # 装机份额已低于 5%，用户可用 `go install` 自建。后续视需求增补。
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build native binary with version injection
        env:
          CGO_ENABLED: '1'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          version="${GITHUB_REF_NAME}"
          commit=$(git rev-parse --short HEAD)
          date=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          go build -trimpath \
            -ldflags "-s -w \
              -X github.com/Anthoooooooony/gw/cmd.Version=${version} \
              -X github.com/Anthoooooooony/gw/cmd.Commit=${commit} \
              -X github.com/Anthoooooooony/gw/cmd.BuildDate=${date}" \
            -o dist/gw \
            .
          ./dist/gw version

      - name: Create archive (tar.gz with README)
        run: |
          cd dist
          cp ../README.md .
          tar czf "gw_${GITHUB_REF_NAME}_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz" \
            gw README.md
          ls -la ./*.tar.gz

      - name: Upload archive artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: gw-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.tar.gz
          retention-days: 1

  release:
    needs: build
    timeout-minutes: 10
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 创建 GitHub Release 需要写权限
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Download all archives into dist/
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: dist/
          pattern: gw-*
          merge-multiple: true

      - name: Generate checksums.txt
        run: |
          cd dist
          sha256sum ./*.tar.gz > checksums.txt
          cat checksums.txt

      # release-please 已在 tag push 同步创建了 GitHub Release 并填好 notes；
      # 此处只把构建 assets 追加到对应 release，不碰 body，避免覆盖 release-please 的变更摘要。
      - name: Upload assets to release-please-created release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release upload "$TAG" dist/*.tar.gz dist/checksums.txt --clobber
