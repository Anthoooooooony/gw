version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck      # 未检查的 error
    - govet         # 官方 vet，覆盖 race/copylocks 等
    - ineffassign   # 无效赋值
    - staticcheck   # 综合分析（包含 U1000 unused、S1 风格、SA* bug）
    - unused        # 未使用的函数/变量/常量
  settings:
    errcheck:
      exclude-functions:
        - fmt.Fprintln   # stderr 写入失败不需要处理
        - fmt.Fprintf
        - fmt.Fprint

formatters:
  enable:
    - gofmt
